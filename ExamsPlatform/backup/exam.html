{% if question_list %}
    <ul>
        {% for q in question_list%}
            <li> {{ q.question_text }}
                {% for c in q.choice_set.all %}
                    <li>
                        {{ c.choice_text }}  
                    </li>  
                {% endfor %} 
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Exam not available available</p>
{% endif %}
